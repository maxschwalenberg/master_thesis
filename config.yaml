# Subjects and ROIs to analyze
analysis:
  subjects_to_analyze: [1] # [1, 2, 3, 7]
  rois_to_analyze:
    { "LO2": 1, "LO1": 2, "hMT+/V5": 3, "OFA": 4, "?": 5, "PPA": 6, "FFA": 7, "V3A/V3B": 8, "RSC" : 9}

# Dataset validation parameters
dataset_validation:
  nsd_samples_subjects_to_check: ["1"] # ['shared', '1', ..., '8']

pipeline:
  step_1_preprocessing:
    execute_step: false

    step: 1
    extract_nsd_data: true
    subjects: [1] # Define subjects for extraction

  step_2_dataset_creation:
    execute_step: true

    download_data: false
    create_data_split: false
    face_detection: true
    generate_non_face_set: false
    generate_positive_set: false
    remove_nans: false
    label_data: false
    load_betas: false
    subjects: [1] # Subjects for dataset creation
    step: 2

  step_3_t_testing:
    execute_step: false

    t_testing: false
    subjects: [1] # Subjects for t-testing
    step: 3

    thresholds_map: [0.0, 2.0, 3.0, 4.0, 5.0]
    clipping_value: 7

  step_4_rsa_analysis:
    execute_step: true

    only_face_set: true
    distance_metric: "correlation"
    rsa_analysis: true
    subjects: [1] # Subjects for RSA
    step: 4

  step_5_gaussian_fitting:
    execute_step: true

    fit_gaussian: true
    visualize: true
    evaluate: true

    t_test_filtering: 0.0
    sigma_filtering: [0, 100]

    subjects: [1] # Subjects for Gaussian fitting
    step: 5

  overwrite_existing: false # Global overwrite flag

