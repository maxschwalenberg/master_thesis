# COCO dataset paths
coco_data:
  coco_train_json_path: data/coco/instances_train2017.json
  coco_val_json_path: data/coco/instances_val2017.json
  nsd_coco_file_path: coco/nsd_coco.xlsx
  nsd_labeled_subset_path: coco/nsd_full_coco.xlsx

# Dataset creation files (Step-wise comments added)
dataset_creation:
  # Step 1: Initial subsets
  subset_non_animate: nsd_full_non_animals.xlsx
  subset_animate: nsd_full_animals_humans.xlsx

  # Step 2: Face detection -> generate positive and negative set
  subset_animate_face_unchecked: faces/faces_unchecked.xlsx
  subset_animate_non_face_unchecked: animate_nonface/animate_non_face_unchecked.xlsx

  # Step 3: Remove NaNs
  subset_animate_face_nans_removed: faces/faces_nans_removed.xlsx
  subset_animate_non_face_nans_removed: animate_nonface/animate_non_face_nans_removed.xlsx

  # Step 4: Labeled (checked labeling)
  subset_animate_face_labelled: faces/faces_labelled.xlsx
  subset_animate_non_face_labelled: animate_nonface/animate_non_face_labelled.xlsx

  # Step 5: Final dataset
  subset_animate_face_final: faces/faces_final.xlsx
  subset_animate_non_face_final: animate_nonface/animate_non_face_final.xlsx

# Face detection results path
face_detection:
  results_path: face_detection_result.json

